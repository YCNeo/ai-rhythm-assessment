<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>ScriptSource AI - AI 分析與行動建議</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .loading-spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #4f46e5;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }

      .fade-in {
        animation: fadeIn 0.3s ease-out forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(5px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      input:focus,
      select:focus {
        border-color: #4f46e5;
        outline: none;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
      }

      body {
        margin: 0;
        padding: 0;
      }

      /* 確保底部按鈕不會被遮擋 */
      .button-container {
        pointer-events: none;
      }

      .button-container button {
        pointer-events: auto;
      }
    </style>
  </head>

  <body class="bg-slate-50 text-slate-900 font-sans pb-40">
    <header
      class="bg-white border-b border-slate-200 px-5 py-4 sticky top-0 z-40 flex items-center justify-center shadow-sm"
    >
      <div class="flex items-center gap-3">
        <div
          class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-md"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5 text-white"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            />
          </svg>
        </div>
        <h1 class="font-black text-xl tracking-tight">AI 分析與行動建議</h1>
      </div>
    </header>

    <main class="max-w-md mx-auto p-5 space-y-6">
      <section
        class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 space-y-4"
      >
        <h2
          class="text-sm font-black text-slate-400 uppercase tracking-widest mb-2"
        >
          基本資訊
        </h2>
        <div class="space-y-4">
          <div>
            <label
              class="block text-[10px] font-bold text-slate-400 uppercase mb-1"
              >電子郵件</label
            >
            <input
              type="email"
              id="input-email"
              class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm"
              placeholder="example@mail.com"
            />
          </div>

          <div class="space-y-2">
            <label
              class="block text-[10px] font-bold text-slate-400 uppercase mb-1"
              >行業別</label
            >
            <select
              id="select-industry"
              class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm"
            >
              <option value="" disabled selected>請選擇行業</option>
              <option value="資訊科技 / 軟體 / 通訊">
                資訊科技 / 軟體 / 通訊
              </option>
              <option value="金融 / 保險 / 證券">金融 / 保險 / 證券</option>
              <option value="醫療 / 護理 / 生技">醫療 / 護理 / 生技</option>
              <option value="教育 / 研究 / 補教">教育 / 研究 / 補教</option>
              <option value="製造 / 營造 / 能源">製造 / 營造 / 能源</option>
              <option value="零售 / 批發 / 電商">零售 / 批發 / 電商</option>
              <option value="媒體 / 行銷 / 廣告">媒體 / 行銷 / 廣告</option>
              <option value="餐飲 / 旅遊 / 休閒">餐飲 / 旅遊 / 休閒</option>
              <option value="法律 / 會計 / 專業顧問">
                法律 / 會計 / 專業顧問
              </option>
              <option value="公共行政 / 社福">公共行政 / 社福</option>
              <option value="其他">其他</option>
            </select>
            <input
              type="text"
              id="input-industry-other"
              class="hidden w-full px-4 py-3 bg-white border-2 border-indigo-100 rounded-xl text-sm fade-in mt-2"
              placeholder="請輸入您的行業"
            />
          </div>

          <div class="space-y-2">
            <label
              class="block text-[10px] font-bold text-slate-400 uppercase mb-1"
              >職業別</label
            >
            <select
              id="select-occupation"
              class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm"
            >
              <option value="" disabled selected>請選擇職業</option>
              <option value="企業主 / 高階主管">企業主 / 高階主管</option>
              <option value="部門經理 / 中階主管">部門經理 / 中階主管</option>
              <option value="工程師 / 技術專家">工程師 / 技術專家</option>
              <option value="行政 / 內勤人員">行政 / 內勤人員</option>
              <option value="業務 / 客服 / 店員">業務 / 客服 / 店員</option>
              <option value="行銷 / 企劃 / 公關">行銷 / 企劃 / 公關</option>
              <option value="設計師 / 創意工作者">設計師 / 創意工作者</option>
              <option value="醫師 / 護理師 / 藥師">醫師 / 護理師 / 藥師</option>
              <option value="律師 / 會計師 / 顧問">律師 / 會計師 / 顧問</option>
              <option value="教師 / 研究人員">教師 / 研究人員</option>
              <option value="學生 / 在學者">學生 / 在學者</option>
              <option value="自由工作者 (SOHO)">自由工作者 (SOHO)</option>
              <option value="其他">其他</option>
            </select>
            <input
              type="text"
              id="input-occupation-other"
              class="hidden w-full px-4 py-3 bg-white border-2 border-indigo-100 rounded-xl text-sm fade-in mt-2"
              placeholder="請輸入您的職業"
            />
          </div>
        </div>
      </section>

      <section id="image-grid" class="grid grid-cols-2 gap-3">
        <label
          id="upload-label"
          class="aspect-square rounded-2xl border-4 border-dashed border-slate-200 flex flex-col items-center justify-center text-slate-400 hover:border-indigo-300 hover:text-indigo-400 cursor-pointer transition-colors"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-8 h-8 mb-1"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4v16m8-8H4"
            />
          </svg>
          <span class="text-[10px] font-bold uppercase text-center px-2"
            >添加手寫照片<br />(可多張)</span
          >
          <input
            type="file"
            id="input-images"
            multiple
            accept="image/*"
            capture="environment"
            class="hidden"
          />
        </label>
      </section>

      <div
        id="error-box"
        class="hidden bg-red-50 text-red-600 p-4 rounded-2xl text-xs font-bold flex items-center gap-3"
      >
        <span id="error-msg"></span>
      </div>

      <div id="results-area" class="space-y-6 hidden"></div>

      <div id="welcome-state" class="py-12 text-center">
        <p class="text-slate-400 text-xs font-medium">
          填寫基本資訊並拍攝照片以開始 AI 分析
        </p>
      </div>
    </main>

    <div class="fixed bottom-8 left-0 right-0 px-6 z-30 button-container">
      <button
        id="btn-analyze"
        disabled
        class="w-full max-w-md mx-auto h-16 rounded-3xl font-black text-lg shadow-2xl flex items-center justify-center gap-3 bg-slate-200 text-slate-400 transition-all active:scale-95"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          id="icon-send"
          class="w-6 h-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"
          />
        </svg>
        <div id="loader" class="loading-spinner hidden"></div>
        <span id="btn-text">請填寫完整資訊</span>
      </button>
    </div>

    <script type="importmap">
      {
        "imports": {
          "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
        }
      }
    </script>

    <?!= include('javascript'); ?>
  </body>
</html>
