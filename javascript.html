<script>
  function loadAppData() {
    const bootstrapEl = document.getElementById("app-bootstrap");
    const raw = bootstrapEl ? bootstrapEl.dataset.app : "{}";
    try {
      return JSON.parse(raw || "{}");
    } catch (err) {
      console.error("APP_DATA 解析失敗:", err);
      return {};
    }
  }

  const appData = loadAppData();
  let questionnaire = appData.questionnaire || { questions: [] };

  const el = {
    versionBadge: document.getElementById("version-badge"),
    surveyTitle: document.getElementById("survey-title"),
    surveyDesc: document.getElementById("survey-desc"),
    questionContainer: document.getElementById("question-container"),
    respondentName: document.getElementById("respondent-name"),
    respondentEmail: document.getElementById("respondent-email"),
    submitBtn: document.getElementById("submit-btn"),
    errorBox: document.getElementById("error-box"),
    successBox: document.getElementById("success-box"),
  };

  function escapeHtml(text) {
    return String(text || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function toDomKey(questionId) {
    return `q-${String(questionId || "").replace(/[^a-zA-Z0-9_-]/g, "_")}`;
  }

  function renderHeader() {
    const requested =
      appData.requestedVersionId ||
      new URLSearchParams(location.search).get("v") ||
      "";
    const active = appData.activeVersionId || questionnaire.id || "";
    const fallbackLabel =
      requested && requested !== active
        ? ` (找不到 ${requested}，已改用 ${active})`
        : "";

    el.versionBadge.textContent = `版本: ${active}${fallbackLabel}`;
    el.surveyTitle.textContent = questionnaire.title || "問卷";
    el.surveyDesc.textContent = questionnaire.description || "";
  }

  function renderQuestions() {
    const questions = questionnaire.questions || [];
    if (!questions.length) {
      el.questionContainer.innerHTML =
        '<p class="text-sm text-slate-500">目前此版本沒有題目。</p>';
      return;
    }

    el.questionContainer.innerHTML = questions
      .map((q, index) => {
        const requiredMark = q.required
          ? '<span class="text-red-500">*</span>'
          : "";
        const title = `<p class="font-bold text-base">${index + 1}. ${escapeHtml(q.title)} ${requiredMark}</p>`;

        if (q.type === "single") {
          const domKey = toDomKey(q.id);
          const options = (q.options || [])
            .map(
              (opt) => `
              <label class="flex items-center gap-2 text-sm text-slate-700">
                <input type="radio" name="${domKey}" value="${escapeHtml(opt)}" class="accent-indigo-600" />
                <span>${escapeHtml(opt)}</span>
              </label>
            `,
            )
            .join("");

          return `
            <div class="space-y-2">
              ${title}
              <div class="space-y-2">${options}</div>
            </div>
          `;
        }

        const domKey = toDomKey(q.id);
        const placeholder = escapeHtml(q.placeholder || "請輸入答案");
        return `
          <div class="space-y-2">
            ${title}
            <textarea
              id="${domKey}"
              class="w-full rounded-xl border border-slate-200 px-3 py-2 bg-slate-50 min-h-28"
              placeholder="${placeholder}"
            ></textarea>
          </div>
        `;
      })
      .join("");
  }

  function clearMessage() {
    el.errorBox.classList.add("hidden");
    el.errorBox.textContent = "";
    el.successBox.classList.add("hidden");
    el.successBox.textContent = "";
  }

  function showError(message) {
    el.errorBox.textContent = message;
    el.errorBox.classList.remove("hidden");
  }

  function showSuccess(message) {
    el.successBox.textContent = message;
    el.successBox.classList.remove("hidden");
  }

  function collectAnswers() {
    const questions = questionnaire.questions || [];
    const answers = [];

    for (const q of questions) {
      let value = "";
      const domKey = toDomKey(q.id);

      if (q.type === "single") {
        const inputs = document.getElementsByName(domKey);
        const checked = Array.from(inputs).find((item) => item.checked);
        value = checked ? checked.value : "";
      } else {
        const input = document.getElementById(domKey);
        value = input ? input.value.trim() : "";
      }

      if (q.required && !value) {
        throw new Error(`請完成必填題目：「${q.title}」`);
      }

      answers.push({
        questionId: q.id,
        questionTitle: q.title,
        answer: value,
      });
    }

    return answers;
  }

  function validateRespondent(name, email) {
    if (!name) {
      throw new Error("請輸入姓名。");
    }
    if (!email) {
      throw new Error("請輸入電子郵件。");
    }
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailPattern.test(email)) {
      throw new Error("電子郵件格式不正確。");
    }
  }

  function submit() {
    clearMessage();

    try {
      const name = el.respondentName.value.trim();
      const email = el.respondentEmail.value.trim();
      validateRespondent(name, email);

      const answers = collectAnswers();
      const payload = {
        versionId: questionnaire.id || "unknown",
        versionTitle: questionnaire.title || "",
        name: name,
        email: email,
        answers: answers,
      };

      el.submitBtn.disabled = true;
      el.submitBtn.textContent = "送出中...";

      if (!(window.google && google.script && google.script.run)) {
        throw new Error("目前不在 Apps Script 環境，無法送出。");
      }

      google.script.run
        .withSuccessHandler((result) => {
          el.submitBtn.disabled = false;
          el.submitBtn.textContent = "送出問卷";

          if (result === "OK") {
            showSuccess("送出成功，感謝填答。");
          } else {
            showError(`送出失敗：${result}`);
          }
        })
        .withFailureHandler((err) => {
          el.submitBtn.disabled = false;
          el.submitBtn.textContent = "送出問卷";
          showError(`送出失敗：${err.message || err}`);
        })
        .saveQuestionnaireResponse(payload);
    } catch (err) {
      showError(err.message || "送出失敗，請稍後再試。");
    }
  }

  function loadQuestionnaireFromServerIfNeeded() {
    const hasQuestions =
      questionnaire &&
      Array.isArray(questionnaire.questions) &&
      questionnaire.questions.length > 0;

    if (hasQuestions) {
      renderHeader();
      renderQuestions();
      return;
    }

    if (!(window.google && google.script && google.script.run)) {
      renderHeader();
      renderQuestions();
      return;
    }

    const requestedVersionId =
      new URLSearchParams(location.search).get("v") ||
      appData.requestedVersionId ||
      "v1";

    google.script.run
      .withSuccessHandler((result) => {
        questionnaire = result || { questions: [] };
        appData.requestedVersionId = requestedVersionId;
        appData.activeVersionId = questionnaire.id || requestedVersionId;
        appData.questionnaire = questionnaire;
        renderHeader();
        renderQuestions();
      })
      .withFailureHandler(() => {
        renderHeader();
        renderQuestions();
      })
      .getQuestionnaireById(requestedVersionId);
  }

  el.submitBtn.addEventListener("click", submit);
  loadQuestionnaireFromServerIfNeeded();
</script>
