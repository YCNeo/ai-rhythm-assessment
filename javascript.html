<script>
  function loadAppData() {
    const bootstrapEl = document.getElementById("app-bootstrap");
    const raw = bootstrapEl ? bootstrapEl.dataset.app : "{}";
    try {
      return JSON.parse(raw || "{}");
    } catch (err) {
      console.error("APP_DATA 解析失敗:", err);
      return {};
    }
  }

  const appData = loadAppData();
  let questionnaire = appData.questionnaire || { questions: [] };

  const el = {
    versionBadge: document.getElementById("version-badge"),
    surveyTitle: document.getElementById("survey-title"),
    surveyDesc: document.getElementById("survey-desc"),
    frontQuestionContainer: document.getElementById("front-question-container"),
    questionContainer: document.getElementById("question-container"),
    respondentName: document.getElementById("respondent-name"),
    respondentEmail: document.getElementById("respondent-email"),
    submitBtn: document.getElementById("submit-btn"),
    errorBox: document.getElementById("error-box"),
    successBox: document.getElementById("success-box"),
    reportModal: document.getElementById("report-modal"),
    reportContent: document.getElementById("report-content"),
    btnCloseModal: document.getElementById("btn-close-modal"),
    btnSendPdf: document.getElementById("btn-send-pdf"),
  };

  const uiState = {
    latestSubmission: null,
    latestReportText: "",
    latestPdfFileId: "",
    latestPdfFileUrl: "",
    latestSubmissionId: "",
  };

  function escapeHtml(text) {
    return String(text || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function toDomKey(questionId) {
    return `q-${String(questionId || "").replace(/[^a-zA-Z0-9_-]/g, "_")}`;
  }

  function renderHeader() {
    const requested =
      appData.requestedVersionId ||
      new URLSearchParams(location.search).get("v") ||
      "";
    const active = appData.activeVersionId || questionnaire.id || "";
    const fallbackLabel =
      requested && requested !== active
        ? ` (找不到 ${requested}，已改用 ${active})`
        : "";

    el.versionBadge.textContent = `版本: ${active}${fallbackLabel}`;
    el.surveyTitle.textContent = questionnaire.title || "問卷";
    el.surveyDesc.textContent = questionnaire.description || "";
  }

  function renderQuestions() {
    const questions = questionnaire.questions || [];
    if (!questions.length) {
      if (el.frontQuestionContainer) {
        el.frontQuestionContainer.innerHTML = "";
      }
      el.questionContainer.innerHTML =
        '<p class="text-sm text-slate-500 leading-7">目前此版本沒有題目。</p>';
      return;
    }
    const isBackgroundQuestion = (question) =>
      !!question.section && question.section.indexOf("第一部分") === 0;

    const renderQuestionCard = (q, index) => {
      const requiredMark = q.required
        ? '<span class="text-red-500">*</span>'
        : "";
      const title = `<p class="font-bold text-base">${index + 1}. ${escapeHtml(q.title)} ${requiredMark}</p>`;

      if (q.type === "single") {
        const domKey = toDomKey(q.id);
        const options = (q.options || [])
          .map(
            (opt) => `
            <label class="flex items-start gap-3 text-sm leading-6 text-slate-700 rounded-xl px-2 py-1 hover:bg-slate-50">
              <input type="radio" name="${domKey}" value="${escapeHtml(opt)}" class="accent-indigo-600" />
              <span>${escapeHtml(opt)}</span>
            </label>
          `,
          )
          .join("");

        return `
          <article class="space-y-4 rounded-2xl border border-slate-200 bg-white p-4 md:p-5">
            ${title}
            <div class="space-y-3">${options}</div>
          </article>
        `;
      }

      if (q.type === "scale") {
        const domKey = toDomKey(q.id);
        const min = Number.isFinite(q.min) ? q.min : 1;
        const max = Number.isFinite(q.max) ? q.max : 5;
        const points = [];
        for (let i = min; i <= max; i += 1) points.push(i);
        const options = points
          .map(
            (point) => `
            <label class="flex flex-col items-center gap-1 text-sm text-slate-700 px-1">
              <input type="radio" name="${domKey}" value="${point}" class="accent-indigo-600 w-4 h-4" />
              <span class="font-semibold">${point}</span>
            </label>
          `,
          )
          .join("");
        const minLabel = escapeHtml(q.minLabel || "");
        const maxLabel = escapeHtml(q.maxLabel || "");

        return `
          <article class="space-y-4 rounded-2xl border border-slate-200 bg-white p-4 md:p-5">
            ${title}
            <div class="rounded-2xl border border-slate-200 p-4 bg-slate-50">
              <div class="flex justify-between text-xs font-medium text-slate-500 mb-3">
                <span>${minLabel}</span>
                <span>${maxLabel}</span>
              </div>
              <div class="flex items-center justify-between gap-2">${options}</div>
            </div>
          </article>
        `;
      }

      const domKey = toDomKey(q.id);
      const placeholder = escapeHtml(q.placeholder || "請輸入答案");
      return `
        <article class="space-y-4 rounded-2xl border border-slate-200 bg-white p-4 md:p-5">
          ${title}
          <textarea
            id="${domKey}"
            class="w-full rounded-2xl border border-slate-200 px-4 py-3 bg-slate-50 min-h-32 leading-7 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400 transition"
            placeholder="${placeholder}"
          ></textarea>
        </article>
      `;
    };

    const sectionMap = {};
    const sectionOrder = [];
    const backgroundCards = [];
    questions.forEach((q, index) => {
      if (isBackgroundQuestion(q)) {
        backgroundCards.push(renderQuestionCard(q, index));
        return;
      }

      const sectionName = q.section || "未分類";
      if (!sectionMap[sectionName]) {
        sectionMap[sectionName] = { questions: [] };
        sectionOrder.push(sectionName);
      }
      sectionMap[sectionName].questions.push({ q, index });
    });

    if (el.frontQuestionContainer) {
      el.frontQuestionContainer.innerHTML = backgroundCards.join("");
    }

    const html = sectionOrder
      .map((sectionName) => {
        const section = sectionMap[sectionName];
        const sectionTitleHtml = `<h4 class="text-base font-black text-indigo-700 border-b border-indigo-100 pb-3">${escapeHtml(sectionName)}</h4>`;
        const questionCards = section.questions
          .map((item) => renderQuestionCard(item.q, item.index))
          .join("");
        return `
          <section class="space-y-4">
            ${sectionTitleHtml}
            <div class="space-y-4">${questionCards}</div>
          </section>
        `;
      })
      .join("");

    el.questionContainer.innerHTML =
      html ||
      '<p class="text-sm text-slate-500 leading-7">目前沒有進階維度題目。</p>';
  }

  function clearMessage() {
    el.errorBox.classList.add("hidden");
    el.errorBox.textContent = "";
    el.successBox.classList.add("hidden");
    el.successBox.textContent = "";
  }

  function showError(message) {
    el.errorBox.textContent = message;
    el.errorBox.classList.remove("hidden");
  }

  function showSuccess(message) {
    el.successBox.textContent = message;
    el.successBox.classList.remove("hidden");
  }

  function openReportModal(reportText) {
    el.reportContent.innerHTML = markdownToHtml(reportText || "");
    el.reportModal.classList.remove("hidden");
    document.body.classList.add("overflow-hidden");
  }

  function closeReportModal() {
    el.reportModal.classList.add("hidden");
    document.body.classList.remove("overflow-hidden");
  }

  function formatInlineMarkdown(text) {
    let escaped = escapeHtml(text || "");
    escaped = escaped.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    // 清理常見殘留標記：例如 "* 內容" 或結尾孤立星號
    escaped = escaped.replace(/^\*\s+/, "");
    escaped = escaped.replace(/\s+\*$/g, "");
    return escaped;
  }

  function markdownToHtml(markdownText) {
    const lines = String(markdownText || "")
      .replace(/\r\n/g, "\n")
      .split("\n");
    const html = [];
    let inUl = false;
    let inOl = false;

    const closeLists = () => {
      if (inUl) {
        html.push("</ul>");
        inUl = false;
      }
      if (inOl) {
        html.push("</ol>");
        inOl = false;
      }
    };

    lines.forEach((lineRaw) => {
      const line = lineRaw.trim();
      if (!line) {
        closeLists();
        return;
      }

      let matched;
      if ((matched = line.match(/^####\s+(.+)/))) {
        closeLists();
        html.push(`<h4>${formatInlineMarkdown(matched[1])}</h4>`);
        return;
      }
      if ((matched = line.match(/^###\s+(.+)/))) {
        closeLists();
        html.push(`<h3>${formatInlineMarkdown(matched[1])}</h3>`);
        return;
      }
      if ((matched = line.match(/^##\s+(.+)/))) {
        closeLists();
        html.push(`<h2>${formatInlineMarkdown(matched[1])}</h2>`);
        return;
      }
      if ((matched = line.match(/^#\s+(.+)/))) {
        closeLists();
        html.push(`<h1>${formatInlineMarkdown(matched[1])}</h1>`);
        return;
      }

      if ((matched = line.match(/^\d+\.\s+(.+)/))) {
        if (inUl) {
          html.push("</ul>");
          inUl = false;
        }
        if (!inOl) {
          html.push("<ol>");
          inOl = true;
        }
        html.push(`<li>${formatInlineMarkdown(matched[1])}</li>`);
        return;
      }

      if (/^---+$/.test(line)) {
        closeLists();
        html.push("<hr />");
        return;
      }

      if ((matched = line.match(/^[-*]\s+(.+)/))) {
        if (inOl) {
          html.push("</ol>");
          inOl = false;
        }
        if (!inUl) {
          html.push("<ul>");
          inUl = true;
        }
        html.push(`<li>${formatInlineMarkdown(matched[1])}</li>`);
        return;
      }

      closeLists();
      html.push(`<p>${formatInlineMarkdown(line)}</p>`);
    });

    closeLists();
    return html.join("");
  }

  function collectAnswers() {
    const questions = questionnaire.questions || [];
    const answers = [];
    const missingTitles = [];

    for (const q of questions) {
      let value = "";
      const domKey = toDomKey(q.id);

      if (q.type === "single" || q.type === "scale") {
        const inputs = document.getElementsByName(domKey);
        const checked = Array.from(inputs).find((item) => item.checked);
        value = checked ? checked.value : "";
      } else {
        const input = document.getElementById(domKey);
        value = input ? input.value.trim() : "";
      }

      if (q.required && !value) {
        missingTitles.push(q.title);
      }

      answers.push({
        questionId: q.id,
        questionTitle: q.title,
        answer: value,
      });
    }

    if (missingTitles.length) {
      throw new Error(
        `請完成所有必填題目：${missingTitles
          .map((title) => `「${title}」`)
          .join("、")}`,
      );
    }

    return answers;
  }

  function validateRespondent(name, email) {
    const missing = [];
    if (!name) missing.push("姓名");
    if (!email) missing.push("電子郵件");
    if (missing.length) {
      throw new Error(`請填寫：${missing.join("、")}。`);
    }
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailPattern.test(email)) {
      throw new Error("電子郵件格式不正確。");
    }
  }

  function submit() {
    clearMessage();

    try {
      const name = el.respondentName.value.trim();
      const email = el.respondentEmail.value.trim();
      validateRespondent(name, email);

      const answers = collectAnswers();
      const payload = {
        versionId: questionnaire.id || "unknown",
        versionTitle: questionnaire.title || "",
        name: name,
        email: email,
        answers: answers,
      };
      uiState.latestSubmission = payload;

      el.submitBtn.disabled = true;
      el.submitBtn.textContent = "分析並準備PDF中...";

      if (!(window.google && google.script && google.script.run)) {
        throw new Error("目前不在 Apps Script 環境，無法送出。");
      }

      google.script.run
        .withSuccessHandler((result) => {
          el.submitBtn.disabled = false;
          el.submitBtn.textContent = "送出問卷";

          if (!result || result.status !== "OK") {
            showError(`送出失敗：${(result && result.message) || "未知錯誤"}`);
            return;
          }

          const reportText = result.reportText || "";
          if (!reportText) {
            showError("AI 回傳內容為空，請稍後再試。");
            return;
          }
          uiState.latestReportText = reportText;
          uiState.latestPdfFileId = result.pdfFileId || "";
          uiState.latestPdfFileUrl = result.pdfFileUrl || "";
          uiState.latestSubmissionId = result.submissionId || "";
          openReportModal(reportText);
          setReportSendStatus(
            "PDF 已先建立完成，確認後可直接寄信。",
            "success",
          );
          showSuccess("問卷已完成分析，請確認後寄送。");
        })
        .withFailureHandler((err) => {
          el.submitBtn.disabled = false;
          el.submitBtn.textContent = "送出問卷";
          showError(`送出失敗：${err.message || err}`);
        })
        .processQuestionnaireSubmission({
          name: payload.name,
          email: payload.email,
          versionId: payload.versionId,
          versionTitle: payload.versionTitle,
          answers: payload.answers,
        });
    } catch (err) {
      showError(err.message || "送出失敗，請稍後再試。");
    }
  }

  function sendPdfToEmail() {
    clearMessage();
    const base = uiState.latestSubmission;
    const reportText = uiState.latestReportText;
    const pdfFileId = uiState.latestPdfFileId;

    if (!base || !reportText || !pdfFileId) {
      showError("找不到可寄送的報告內容，請先送出問卷並完成分析。");
      return;
    }

    el.btnSendPdf.disabled = true;
    el.btnSendPdf.textContent = "寄送中...";

    google.script.run
      .withSuccessHandler((result) => {
        el.btnSendPdf.disabled = false;
        el.btnSendPdf.textContent = "寄到信箱";
        if (result && result.status === "OK") {
          showSuccess("PDF 已寄到你的信箱。");
        } else {
          const msg = `寄送失敗：${(result && result.message) || "未知錯誤"}`;
          showError(msg);
        }
      })
      .withFailureHandler((err) => {
        el.btnSendPdf.disabled = false;
        el.btnSendPdf.textContent = "寄到信箱";
        const msg = `寄送失敗：${err.message || err}`;
        showError(msg);
      })
      .sendReportPdf({
        name: base.name,
        email: base.email,
        versionId: base.versionId,
        versionTitle: base.versionTitle,
        reportText: reportText,
        pdfFileId: pdfFileId,
        submissionId: uiState.latestSubmissionId || "",
      });
  }

  function loadQuestionnaireFromServerIfNeeded() {
    const hasQuestions =
      questionnaire &&
      Array.isArray(questionnaire.questions) &&
      questionnaire.questions.length > 0;

    if (hasQuestions) {
      renderHeader();
      renderQuestions();
      return;
    }

    if (!(window.google && google.script && google.script.run)) {
      renderHeader();
      renderQuestions();
      return;
    }

    const requestedVersionId =
      new URLSearchParams(location.search).get("v") ||
      appData.requestedVersionId ||
      "v1";

    google.script.run
      .withSuccessHandler((result) => {
        questionnaire = result || { questions: [] };
        appData.requestedVersionId = requestedVersionId;
        appData.activeVersionId = questionnaire.id || requestedVersionId;
        appData.questionnaire = questionnaire;
        renderHeader();
        renderQuestions();
      })
      .withFailureHandler(() => {
        renderHeader();
        renderQuestions();
      })
      .getQuestionnaireById(requestedVersionId);
  }

  el.submitBtn.addEventListener("click", submit);
  el.btnSendPdf.addEventListener("click", sendPdfToEmail);
  el.btnCloseModal.addEventListener("click", closeReportModal);
  el.reportModal.addEventListener("click", (event) => {
    if (event.target === el.reportModal) {
      closeReportModal();
    }
  });
  loadQuestionnaireFromServerIfNeeded();
</script>
